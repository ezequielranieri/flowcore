services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: flowcore
      POSTGRES_PASSWORD: flowcore_password
      POSTGRES_DB: flowcore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    environment:
      - DATABASE_URL=postgresql://flowcore:flowcore_password@db:5432/flowcore_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
    command: uvicorn flowcore.adapters.api:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://flowcore:flowcore_password@db:5432/flowcore_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - rabbitmq
    command: celery -A flowcore.adapters.worker worker --loglevel=info

volumes:
  postgres_data:
